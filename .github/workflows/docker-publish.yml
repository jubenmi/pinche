name: Docker Publish

on:
  push:
    branches:
      - main
      - develop
      - publish
  workflow_dispatch:

env:
  API_IMAGE_NAME: hkccr.ccs.tencentyun.com/murder/pinche
  ADMIN_WEB_IMAGE_NAME: hkccr.ccs.tencentyun.com/murder/pinche-admin-web

jobs:
  publish-images:
    name: Publish Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Set Docker tags
        id: tags
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          API_TAGS="${API_IMAGE_NAME}:${BRANCH_NAME}"
          ADMIN_WEB_TAGS="${ADMIN_WEB_IMAGE_NAME}:${BRANCH_NAME}"
          if [ "${BRANCH_NAME}" = "publish" ]; then
            API_TAGS="${API_TAGS},${API_IMAGE_NAME}:latest"
            ADMIN_WEB_TAGS="${ADMIN_WEB_TAGS},${ADMIN_WEB_IMAGE_NAME}:latest"
          fi
          echo "api_tags=${API_TAGS}" >> "${GITHUB_OUTPUT}"
          echo "admin_web_tags=${ADMIN_WEB_TAGS}" >> "${GITHUB_OUTPUT}"

      - name: Login to Tencent Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: hkccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_REGISTRY_USER }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate admin web map key secret
        env:
          VITE_TENCENT_MAP_KEY: ${{ secrets.VITE_TENCENT_MAP_KEY }}
        run: |
          if [ -z "${VITE_TENCENT_MAP_KEY}" ]; then
            echo "VITE_TENCENT_MAP_KEY secret is required for admin web map features." >&2
            exit 1
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}

      - name: Build and push admin web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.admin_web_tags }}
          build-args: |
            VITE_TENCENT_MAP_KEY=${{ secrets.VITE_TENCENT_MAP_KEY }}
