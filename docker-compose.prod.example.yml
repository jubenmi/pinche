# `.env.production` 必须显式保留以下 D46 默认关闭配置；Compose 通过 env_file 传入所有服务：
# CONTENT_MODERATION_AUTHOR_PRIVATE_TEXT_ENABLED=false
# CONTENT_MODERATION_AUTHOR_PRIVATE_TEXT_ACTIONS=
# CONTENT_MODERATION_AUTHOR_PRIVATE_IMAGE_ENABLED=false
# CONTENT_MODERATION_AUTHOR_PRIVATE_VIDEO_ENABLED=false
# CONTENT_MODERATION_AUTHOR_PREVIEW_TTL_SECONDS=60
services:
  api:
    image: ${PINCHE_API_IMAGE:-hkccr.ccs.tencentyun.com/murder/pinche:latest}
    pull_policy: always
    env_file:
      - .env.production
    expose:
      - "3018"
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.pinche-api.rule=Host(`api.pinche.jubenmi.com`)
      - traefik.http.routers.pinche-api.entrypoints=websecure
      - traefik.http.routers.pinche-api.tls=true
      - traefik.http.routers.pinche-api.tls.certresolver=letsencrypt
      - traefik.http.routers.pinche-api.service=pinche-api
      - traefik.http.services.pinche-api.loadbalancer.server.port=3018
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    restart: unless-stopped

  admin-web:
    image: hkccr.ccs.tencentyun.com/murder/pinche-admin-web:latest
    pull_policy: always
    expose:
      - "8080"
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.pinche-admin-web.rule=Host(`admin.pinche.jubenmi.com`)
      - traefik.http.routers.pinche-admin-web.entrypoints=websecure
      - traefik.http.routers.pinche-admin-web.tls=true
      - traefik.http.routers.pinche-admin-web.tls.certresolver=letsencrypt
      - traefik.http.routers.pinche-admin-web.service=pinche-admin-web
      - traefik.http.services.pinche-admin-web.loadbalancer.server.port=8080
    depends_on:
      - api
    restart: unless-stopped

  migrate:
    image: ${PINCHE_API_IMAGE:-hkccr.ccs.tencentyun.com/murder/pinche:latest}
    pull_policy: always
    env_file:
      - .env.production
    command: npm run migrate
    networks:
      - internal
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  album-image-cleanup:
    image: ${PINCHE_API_IMAGE:-hkccr.ccs.tencentyun.com/murder/pinche:latest}
    pull_policy: always
    env_file:
      - .env.production
    command: npm run job:album-image-cleanup
    networks:
      - internal
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    restart: unless-stopped

  content-moderation-retry:
    image: ${PINCHE_API_IMAGE:-hkccr.ccs.tencentyun.com/murder/pinche:latest}
    pull_policy: always
    env_file:
      - .env.production
    command: npm run job:content-moderation-retry
    networks:
      - internal
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 2m

  content-moderation-orphan-scan:
    image: ${PINCHE_API_IMAGE:-hkccr.ccs.tencentyun.com/murder/pinche:latest}
    pull_policy: always
    env_file:
      - .env.production
    command: npm run job:content-moderation-orphan-scan
    networks:
      - internal
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 2m

  content-moderation-production-preflight-timeout:
    image: ${PINCHE_API_IMAGE:-hkccr.ccs.tencentyun.com/murder/pinche:latest}
    pull_policy: always
    env_file:
      - .env.production
    command: npm run job:content-moderation-production-preflight-timeout
    networks:
      - internal
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 2m

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: replace-with-production-root-password
      MYSQL_DATABASE: pinche
      MYSQL_USER: pinche
      MYSQL_PASSWORD: replace-with-production-mysql-password
    volumes:
      - pinche_mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -upinche -p$${MYSQL_PASSWORD} --silent"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

networks:
  proxy:
    external: true
  internal:

volumes:
  pinche_mysql_data:
